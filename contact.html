        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Lato:wght@300;400&display=swap">

<body>

    <header class="site-header">
        <div class="site-identity">
            <h1><a href="#">LAITH</a></h1>
        </div>
        <div class="menu-icon" onclick="toggleNav()">
            <div class="bar"></div>

        <nav class="site-navigation">

                <li><a href="index.html">Home</a></li>

            </ul>
        </nav>
    </header>


    <div class="centered-div-contact">
        <h1 id="contact-title"> Contact</h1>
        <hr class="separator">
    </div>

    <div class="contact-container">
        <h2></h2>
        <form action="#" method="post">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="message">Your Message:</label>
                <textarea id="message" name="message" rows="4" required></textarea>
            </div>

            <button type="submit">Submit</button>
        </form>
    </div>

    <!-- Footer Section -->
    <footer class="site-footer">
        <div class="footer-content">
            <p>&copy; 2023 Laith Hijazi. All rights reserved.</p>
            <ul class="social-icons">

                            alt="LinkedIn icon"></a></li>
                <li><a href="https://twitter.com/home" target="_blank"><img

                            alt="Twitter icon"></a></li>
                <li><a href="https://github.com/LaithHijazi" target="_blank"><img
                            src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg"
                            alt="Github Icon"></a></li>
            </ul>
        </div>
    </footer>

    <script>
        function toggleNav() {
            var nav = document.querySelector('.site-navigation ul');
            nav.classList.toggle('show');
        }
    </script>
</body>

</html>
